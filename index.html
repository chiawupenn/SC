            document.getElementById('modalPrice').textContent = `${product.rmbPrice}元`;

            const thumbnailsContainer = document.getElementById('thumbnailContainer');
            thumbnailsContainer.innerHTML = '';
            
            const viewLabels = ['正面 Front', '背面 Back', '细节 Detail'];
            viewLabels.forEach((label, index) => {
                const thumb = document.createElement('div');
                thumb.className = `thumbnail ${index === 0 ? 'active' : ''}`;
                thumb.innerHTML = `<span style="font-size:2em">👕</span>`;
                thumb.title = label;
                
                thumb.onclick = () => {
                    document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
                    thumb.classList.add('active');
                    img.alt = `${product.name} - ${label}`;
                };
                
                thumbnailsContainer.appendChild(thumb);
            });

            modal.style.display = 'block';
        };

        const closeModal = () => {
            document.getElementById('imageModal').style.display = 'none';
        };

        document.querySelector('.close').onclick = closeModal;
        window.onclick = (e) => {
            if (e.target.id === 'imageModal') closeModal();
        };

        const renderProducts = (filteredProducts) => {
            const productsGrid = document.getElementById('productsGrid');
            productsGrid.innerHTML = '';

            filteredProducts.forEach(product => {
                const chineseCategory = getChineseCategory(product.categoryId);
                
                const card = document.createElement('div');
                card.className = 'product-card';

                let sizesHtml = '';
                if (product.size) {
                    sizesHtml = `<span class="one-size-badge">均码</span>`;
                } else if (product.sizes) {
                    product.sizes.forEach(size => {
                        const isAvailable = product.sizeAvailable.includes(size);
                        sizesHtml += `<span class="${isAvailable ? 'size-badge' : 'size-unavailable'}">${size}</span>`;
                    });
                }

                card.innerHTML = `
                    <div class="product-image" onclick="openModal(${JSON.stringify(product).replace(/"/g, '&quot;')})">
                        <span class="category-badge">${chineseCategory}</span>
                        <img src="${getImagePath(product)}" alt="${product.name}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                        <div class="image-loading" style="display:none">📷</div>
                        <div class="image-error" style="display:block; color:#999; font-size:2em;">图片加载中...</div>
                        <div class="click-hint"><i class="fas fa-eye"></i> 点击查看大图</div>
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">${product.chineseName}</h3>
                        <p class="product-color"><i class="fas fa-circle" style="color: #666; font-size: 8px;"></i> ${getChineseColor(product.color || '默认')}</p>
                        
                        <div class="price-section">
                            <div class="price-label">商品售价</div>
                            <div class="rmb-price">${product.rmbPrice}元</div>
                        </div>

                        <div class="sizes-section">
                            <div class="sizes-label">
                                <i class="fas fa-tshirt"></i> 尺码
                            </div>
                            <div class="sizes-list">
                                ${sizesHtml}
                            </div>
                        </div>
                    </div>
                `;

                productsGrid.appendChild(card);
            });
        };

        const filterAndRenderProducts = (filter) => {
            let filtered = productsData;
            if (filter !== 'all') {
                filtered = productsData.filter(p => p.category === filter);
            }
            renderProducts(filtered);
        };

        document.addEventListener('DOMContentLoaded', () => {
            console.log('✅ Loaded products:', productsData.length, 'items');
            console.log('📸 Images from:', imagePath);
            renderFilters();
            filterAndRenderProducts('all');
        });
    </script>
</body>
</html>
